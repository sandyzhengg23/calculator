name: Calculator App CI

run-name: ${{ github.actor }} is testing the calculator app 🧮

on: [push]

jobs:
  Test-Calculator-App:
    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

      - run: |
          echo "🐧 This job is running on a ${{ runner.os }} server hosted by GitHub."

      - run: |
          echo "🔎 Branch: ${{ github.ref }} | Repository: ${{ github.repository }}"

      - name: Check out repository code
        uses: actions/checkout@v4

      - run: |
          echo "💡 The repository has been cloned to the runner."

      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run calculator app tests with coverage
        run: |
          pytest --cov=app --junit-xml=results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: calculator-test-results
          path: results.xml

      - run: |
          echo "🍏 This job status is ${{ job.status }}."
